name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
            artifact_name: ao-linux-x64
            archive_ext: tar.gz
            executable: ao
          - os: windows-latest
            platform: win
            arch: x64
            artifact_name: ao-windows-x64
            archive_ext: zip
            executable: ao.exe
          - os: macos-latest
            platform: darwin
            arch: arm64
            artifact_name: ao-darwin-arm64
            archive_ext: tar.gz
            executable: ao
          - os: macos-15-intel
            platform: darwin
            arch: x64
            artifact_name: ao-darwin-x64
            archive_ext: tar.gz
            executable: ao

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Node 26.4.0 SEA binaries segfault on Intel macOS (see nodejs/node#62893).
          node-version: "26.3.1"
          cache: npm

      - run: npm ci

      - name: Probe Intel macOS SEA baseline (darwin-x64 only)
        if: matrix.artifact_name == 'ao-darwin-x64'
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p dist
          echo 'console.log("sea-probe-ok")' > dist/sea-probe.mjs
          node -e "const fs=require('fs'); fs.writeFileSync('dist/sea-probe-config.json', JSON.stringify({main:'dist/sea-probe.mjs',mainFormat:'module',output:'dist/sea-probe'}, null, 2));"
          node --build-sea dist/sea-probe-config.json
          codesign --sign - --force --entitlements tools/build/sea-entitlements.plist dist/sea-probe
          ./dist/sea-probe
          curl -fsSL -o dist/ao-v0.1.1.tar.gz "https://github.com/gray0128/AgentOrchestrator/releases/download/v0.1.1/ao-darwin-x64.tar.gz"
          tar -xzf dist/ao-v0.1.1.tar.gz -C dist ao
          dist/ao --help | head -n 3

      - name: Build single executable
        env:
          AO_PLATFORM: ${{ matrix.platform }}
          AO_ARCH: ${{ matrix.arch }}
          AO_SEA_OUTPUT: dist/${{ matrix.executable }}
        run: node tools/build/build-sea.mjs

      - name: Smoke test release binary
        shell: bash
        run: node tools/run-cli-smoke.mjs --binary dist/${{ matrix.executable }} --skip-link

      - name: Package archive (Unix)
        if: runner.os != 'Windows'
        run: |
          chmod +x "dist/${{ matrix.executable }}"
          cd dist
          tar -czf "../${{ matrix.artifact_name }}.tar.gz" "${{ matrix.executable }}"
          shasum -a 256 "../${{ matrix.artifact_name }}.tar.gz" > "../${{ matrix.artifact_name }}.tar.gz.sha256"

      - name: Package archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/${{ matrix.executable }}" -DestinationPath "${{ matrix.artifact_name }}.zip" -Force
          $hash = Get-FileHash "${{ matrix.artifact_name }}.zip" -Algorithm SHA256
          "$($hash.Hash)  ${{ matrix.artifact_name }}.zip" | Out-File -Encoding ascii "${{ matrix.artifact_name }}.zip.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.artifact_name }}.${{ matrix.archive_ext }}
            ${{ matrix.artifact_name }}.${{ matrix.archive_ext }}.sha256

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: ${{ !cancelled() && startsWith(github.ref, 'refs/tags/v') }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/*.sha256
