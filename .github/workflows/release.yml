name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
            artifact_name: ao-linux-x64
            archive_ext: tar.gz
            executable: ao
          - os: windows-latest
            platform: win
            arch: x64
            artifact_name: ao-windows-x64
            archive_ext: zip
            executable: ao.exe
          - os: macos-latest
            platform: darwin
            arch: arm64
            artifact_name: ao-darwin-arm64
            archive_ext: tar.gz
            executable: ao
          - os: macos-latest
            platform: darwin
            arch: x64
            artifact_name: ao-darwin-x64
            archive_ext: tar.gz
            executable: ao
            sea_node_arch: x64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Node 26.4.0 SEA binaries segfault on Intel macOS (see nodejs/node#62893).
          node-version: "26.3.1"
          cache: npm

      - run: npm ci

      - name: Install Node.js x64 base for darwin-x64 SEA
        if: matrix.sea_node_arch == 'x64'
        shell: bash
        run: |
          set -euxo pipefail
          NODE_VERSION=26.3.1
          curl -fsSL -o /tmp/node-x64.tgz "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-darwin-x64.tar.gz"
          tar -xzf /tmp/node-x64.tgz -C /tmp
          echo "NODE_SEA_NODE=/tmp/node-v${NODE_VERSION}-darwin-x64/bin/node" >> "$GITHUB_ENV"

      - name: Build single executable
        env:
          AO_PLATFORM: ${{ matrix.platform }}
          AO_ARCH: ${{ matrix.arch }}
          AO_SEA_OUTPUT: dist/${{ matrix.executable }}
          NODE_SEA_NODE: ${{ matrix.sea_node_arch == 'x64' && env.NODE_SEA_NODE || '' }}
        run: node tools/build/build-sea.mjs

      - name: Verify darwin-x64 binary structure
        if: matrix.sea_node_arch == 'x64'
        shell: bash
        run: |
          set -euxo pipefail
          file "dist/${{ matrix.executable }}" | grep -E 'Mach-O 64-bit executable x86_64'
          test -x "dist/${{ matrix.executable }}"
          test -s "dist/${{ matrix.executable }}"

      - name: Smoke test release binary
        if: matrix.sea_node_arch != 'x64'
        shell: bash
        run: node tools/run-cli-smoke.mjs --binary "dist/${{ matrix.executable }}" --skip-link

      - name: Package archive (Unix)
        if: runner.os != 'Windows'
        run: |
          chmod +x "dist/${{ matrix.executable }}"
          cd dist
          tar -czf "../${{ matrix.artifact_name }}.tar.gz" "${{ matrix.executable }}"
          shasum -a 256 "../${{ matrix.artifact_name }}.tar.gz" > "../${{ matrix.artifact_name }}.tar.gz.sha256"

      - name: Package archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/${{ matrix.executable }}" -DestinationPath "${{ matrix.artifact_name }}.zip" -Force
          $hash = Get-FileHash "${{ matrix.artifact_name }}.zip" -Algorithm SHA256
          "$($hash.Hash)  ${{ matrix.artifact_name }}.zip" | Out-File -Encoding ascii "${{ matrix.artifact_name }}.zip.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.artifact_name }}.${{ matrix.archive_ext }}
            ${{ matrix.artifact_name }}.${{ matrix.archive_ext }}.sha256

  bundle:
    name: ao-bundle
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "26.3.1"
          cache: npm

      - run: npm ci

      - name: Build bundle
        run: node tools/build/build-bundle.mjs

      - name: Smoke test bundle
        run: node tools/run-cli-smoke.mjs --binary dist/ao.bundle.mjs --binary-wrapper node --skip-link

      - name: Package bundle archives
        run: |
          rm -f ao-bundle.tar.gz ao-bundle.tar.gz.sha256 ao-bundle-windows.zip ao-bundle-windows.zip.sha256
          cd dist
          tar -czf ../ao-bundle.tar.gz ao ao.bundle.mjs
          sha256sum ../ao-bundle.tar.gz > ../ao-bundle.tar.gz.sha256
          zip ../ao-bundle-windows.zip ao.cmd ao.bundle.mjs
          sha256sum ../ao-bundle-windows.zip > ../ao-bundle-windows.zip.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: ao-bundle
          path: |
            ao-bundle.tar.gz
            ao-bundle.tar.gz.sha256
            ao-bundle-windows.zip
            ao-bundle-windows.zip.sha256

  release:
    name: Publish GitHub Release
    needs: [build, bundle]
    runs-on: ubuntu-latest
    if: ${{ !cancelled() && startsWith(github.ref, 'refs/tags/v') }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/*.sha256
