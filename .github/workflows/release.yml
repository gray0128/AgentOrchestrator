name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
            artifact_name: ao-linux-x64
            archive_ext: tar.gz
            executable: ao
          - os: windows-latest
            platform: win
            arch: x64
            artifact_name: ao-windows-x64
            archive_ext: zip
            executable: ao.exe
          - os: macos-latest
            platform: darwin
            arch: arm64
            artifact_name: ao-darwin-arm64
            archive_ext: tar.gz
            executable: ao

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "26"
          cache: npm

      - run: npm ci

      - name: Build single executable
        env:
          AO_PLATFORM: ${{ matrix.platform }}
          AO_ARCH: ${{ matrix.arch }}
          AO_SEA_OUTPUT: dist/${{ matrix.executable }}
        run: node tools/build/build-sea.mjs

      - name: Package archive (Unix)
        if: runner.os != 'Windows'
        run: |
          chmod +x "dist/${{ matrix.executable }}"
          cd dist
          tar -czf "../${{ matrix.artifact_name }}.tar.gz" "${{ matrix.executable }}"
          shasum -a 256 "../${{ matrix.artifact_name }}.tar.gz" > "../${{ matrix.artifact_name }}.tar.gz.sha256"

      - name: Package archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/${{ matrix.executable }}" -DestinationPath "${{ matrix.artifact_name }}.zip" -Force
          $hash = Get-FileHash "${{ matrix.artifact_name }}.zip" -Algorithm SHA256
          "$($hash.Hash)  ${{ matrix.artifact_name }}.zip" | Out-File -Encoding ascii "${{ matrix.artifact_name }}.zip.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.artifact_name }}.${{ matrix.archive_ext }}
            ${{ matrix.artifact_name }}.${{ matrix.archive_ext }}.sha256

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: ${{ !cancelled() && startsWith(github.ref, 'refs/tags/v') }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/*.sha256
