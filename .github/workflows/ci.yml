name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: npm run check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "26"
          cache: npm

      - name: Configure git for workspace fixture tests
        run: git config --global init.defaultBranch main

      - run: npm ci

      - run: npm run check

  coverage:
    name: npm run coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "26"
          cache: npm

      - name: Configure git for workspace fixture tests
        run: git config --global init.defaultBranch main

      - run: npm ci

      - run: npm run coverage

  smoke-e2e:
    name: npm run smoke:e2e
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "26"
          cache: npm

      - name: Configure git for workspace fixture tests
        run: git config --global init.defaultBranch main

      - run: npm ci

      - run: npm run smoke:e2e

  smoke-ui:
    name: npm run smoke:ui
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "26"
          cache: npm

      - name: Configure git for workspace fixture tests
        run: git config --global init.defaultBranch main

      - run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - run: npm run smoke:ui

  smoke-cli:
    name: npm run smoke:cli
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "26"
          cache: npm

      - run: npm ci

      - run: npm run smoke:cli
